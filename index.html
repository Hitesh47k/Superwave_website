    <title>SCAIL | Intelligent Infrastructure</title>
    <!-- Security Headers (Meta) -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- SEO & Accessibility -->
    <meta property="og:title" content="SCAIL | Intelligent Infrastructure" />
    <meta property="og:description" content="SCAIL - Intelligent infrastructure and highway solutions." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon-->

    <link rel="icon" type="image/png" href="/favicon.png">

    <!--  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      // Theme initialization to prevent FOUC
      // Defaults to Dark Mode on first visit, or uses saved preference
      (function() {
        try {
          var savedTheme = localStorage.getItem('scail-theme');
          if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            // If savedTheme is 'dark' or null (first visit), force dark mode
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
